<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" />
    <title>Remote</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h2>Remote Main</h2>
      <div>
        <button onclick="incCount('Alpha')">Inc Alpha</button>
        Alpha: <span id="countA"></span>
      </div>
      <div>
        <button onclick="incCount('Gamma')">Inc Gamma</button>
        Gamma: <span id="countG"></span>
      </div>
      <div>
        <button onclick="incCount('Reset')">Reset All</button>
      </div>
    </main>

    <script>
      function incCount(topic) {
        globalThis.parent.postMessage(`${topic}:incCount[remote]`, '*');
      }
      const counts = {
        Alpha: document.querySelector('#countA'),
        Gamma: document.querySelector('#countG'),
      };

      globalThis.addEventListener('message', ({ data: { topic, payload } }) => {
        counts[topic].textContent = payload;
      });
    </script>
  </body>
</html>
