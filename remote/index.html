<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.png" />
    <title>Remote</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h2>Remote App</h2>
      <div>
        <button onclick="incCount('Alpha')">Inc Alpha</button>
        Alpha: <span id="countA"></span>
      </div>
      <div>
        <button onclick="incCount('Gamma')">Inc Gamma</button>
        Gamma: <span id="countG"></span>
      </div>
      <div>
        <button onclick="incCount('Reset')">Reset All</button>
      </div>
      <br />
      <hr />
      <section>
        <remote-comp
          title="Remote Component"
          btn1="Alpha"
          btn2="Delta"
        ></remote-comp>
      </section>
    </main>

    <script>
      let delta = 0;

      function incCount(topic) {
        globalThis.parent.postMessage(`${topic}:incCount[remote]`, '*');
      }
      const counts = {
        Alpha: document.querySelector('#countA'),
        Gamma: document.querySelector('#countG'),
        Delta: null,
      };

      globalThis.addEventListener('message', ({ data: { topic, payload } }) => {
        if (counts.hasOwnProperty(topic)) {
          if (counts[topic]) {
            counts[topic].textContent = payload;
          } else {
            topic = 'Reset';
            delta = 0;
            payload = 0;
          }
        }

        const evt = new CustomEvent('topicChangeIn', {
          detail: { topic, payload },
        });
        document.querySelector('remote-comp').dispatchEvent(evt);
      });
    </script>
    <script type="module">
      import './remote-comp.js';

      globalThis.addEventListener('topicChangeOut', ({ detail }) => {
        if (detail === 'Delta') {
          delta++;
          const evt = new CustomEvent('topicChangeIn', {
            detail: { topic: detail, payload: delta },
          });
          document.querySelector('remote-comp').dispatchEvent(evt);
        } else {
          if (detail === 'Reset') {
            delta = 0;
            const evt = new CustomEvent('topicChangeIn', {
              detail: { topic: detail, payload: delta },
            });
            document.querySelector('remote-comp').dispatchEvent(evt);
          }
          incCount(detail);
        }
      });
    </script>
  </body>
</html>
